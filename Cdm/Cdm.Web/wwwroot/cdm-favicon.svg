<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background square with rounded corners -->
  <rect width="100" height="100" rx="14" fill="#0f0f1e"/>
  <!-- Globe circle -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#c9a84c" stroke-width="3.5"/>
  <!-- Vertical meridian -->
  <ellipse cx="50" cy="50" rx="16" ry="32" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <!-- Equator -->
  <line x1="18" y1="50" x2="82" y2="50" stroke="#c9a84c" stroke-width="2"/>
  <!-- Parallel lines -->
  <path d="M24 34 Q50 28 76 34" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <path d="M24 66 Q50 72 76 66" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
</svg>
