# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy to Azure - Web & API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build Web Frontend
        run: dotnet build Cdm/Cdm.Web/Cdm.Web.csproj --configuration Release

      - name: Publish Web Frontend
        run: dotnet publish Cdm/Cdm.Web/Cdm.Web.csproj -c Release -o ${{env.DOTNET_ROOT}}/web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: ${{env.DOTNET_ROOT}}/web

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build API Backend
        run: dotnet build Cdm/Cdm.ApiService/Cdm.ApiService.csproj --configuration Release

      - name: Publish API Backend
        run: dotnet publish Cdm/Cdm.ApiService/Cdm.ApiService.csproj -c Release -o ${{env.DOTNET_ROOT}}/api

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-app
          path: ${{env.DOTNET_ROOT}}/api

  run-migrations:
    runs-on: ubuntu-latest
    needs: build-api
    permissions:
      contents: read
      id-token: write  # Required for EntraID authentication

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore dependencies
        run: dotnet restore Cdm/Cdm.Migrations/Cdm.Migrations.csproj

      - name: Login to Azure with EntraID
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Azure SQL Access Token
        id: get-token
        run: |
          TOKEN=$(az account get-access-token --resource https://database.windows.net/ --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "sql-token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Run database migrations with EntraID
        run: |
          dotnet ef database update \
            --project Cdm/Cdm.Migrations/Cdm.Migrations.csproj \
            --startup-project Cdm/Cdm.Migrations/Cdm.Migrations.csproj
        env:
          DOTNET_ENVIRONMENT: Production
          AZURE_SQL_ACCESS_TOKEN: ${{ steps.get-token.outputs.sql-token }}

  deploy-web:
    runs-on: ubuntu-latest
    needs: build-web
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Web to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-chronique-des-mondes-web'
          slot-name: 'Production'
          package: .

  deploy-api:
    runs-on: ubuntu-latest
    needs: run-migrations
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-chroniquedesmondes-api'
          slot-name: 'Production'
          package: .